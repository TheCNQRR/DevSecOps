name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache OWASP Data
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/odc-data
          key: ${{ runner.os }}-odc-data-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-odc-data-

      - name: SAST - Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto --error

      - name: SCA - Dependency Check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:z \
            -v ${{ github.workspace }}/odc-data:/usr/share/dependency-check/data:z \
            owasp/dependency-check-action:latest \
            --project "MyProject" \
            --scan /src \
            --format "HTML" \
            --disableAssembly \
            --enableExperimental \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS 7

      - name: DAST - OWASP ZAP Scan
        run: |
          chmod +x ./gradlew
          export SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/db
          export SPRING_DATASOURCE_USERNAME=user
          export SPRING_DATASOURCE_PASSWORD=password
          
          JWT_SECRET=${{ secrets.JWT_SECRET }} ./gradlew :AuthService:bootRun > server.log 2>&1 &
          
          npx wait-on -t 60000 http://localhost:8081 || (echo "Сервер не поднялся, логи:" && cat server.log && exit 1)
          
          docker run -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8081 \
            -g gen.conf \
            -r report.html || true
          
          pkill -f bootRun
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            dependency-check-report.html
            report.html