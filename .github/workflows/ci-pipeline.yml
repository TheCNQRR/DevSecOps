name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SAST - Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto --error

      - name: SCA - Dependency Check
        run: |
          # Используем флаг --noupdate, если база есть, ИЛИ 
          # просто удаляем папку с данными перед каждым запуском.
          # Чтобы не было конфликтов с монтированием, удаляем всё содержимое odc-data
          rm -rf ${{ github.workspace }}/odc-data/*
          
          docker run --rm \
            -v ${{ github.workspace }}:/src:z \
            -v ${{ github.workspace }}/odc-data:/usr/share/dependency-check/data:z \
            owasp/dependency-check-action:latest \
            --project "MyProject" \
            --scan /src \
            --format "HTML" \
            --disableAssembly \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS 7

      - name: DAST - OWASP ZAP Scan
        run: |
          ./gradlew bootRun &
          npx wait-on http://localhost:8080
          docker run -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8080 \
            -g gen.conf \
            -r report.html
        continue-on-error: true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            build/reports/dependency-check/
            report.html