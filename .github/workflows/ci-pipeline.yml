name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache OWASP Data
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/odc-data
          key: ${{ runner.os }}-odc-data-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-odc-data-

      - name: SAST - Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto --error

      - name: SCA - Dependency Check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:z \
            -v ${{ github.workspace }}/odc-data:/usr/share/dependency-check/data:z \
            owasp/dependency-check-action:latest \
            --project "MyProject" \
            --scan /src \
            --format "HTML" \
            --disableAssembly \
            --enableExperimental \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS 7

      - name: DAST - OWASP ZAP Scan (Auth & Employee Services)
        run: |
          chmod +x ./gradlew
          
          echo "Запуск встроенного брокера Kafka..."
          docker run -d --name kafka-dast --network="host" \
            -e KAFKA_ENABLE_KRAFT=yes \
            -e KAFKA_CFG_PROCESS_ROLES=broker,controller \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
            -e KAFKA_CFG_BROKER_ID=1 \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093 \
            -e KAFKA_ALLOW_PLAINTEXT_LISTENER=yes \
            bitnami/kafka:3.4
          
          echo "Создание базы данных 'employee' в Postgres..."
          docker run --net="host" --rm -e PGPASSWORD=postgres postgres:15 \
            psql -h localhost -U postgres -c "CREATE DATABASE employee;" || true

          echo "Запуск AuthService на порту 8081..."
          ./gradlew :AuthService:bootRun > auth-server.log 2>&1 &
          
          echo "Запуск EmployeeService на порту 8082..."
          ./gradlew :EmployeeService:bootRun > employee-server.log 2>&1 &
          
          echo "Ожидание готовности обоих сервисов..."
          TIMEOUT=90
          while ! nc -z localhost 8081 || ! nc -z localhost 8082; do   
            sleep 5
            TIMEOUT=$((TIMEOUT - 5))
            if [ $TIMEOUT -le 0 ]; then
              echo "Один из сервисов не смог запуститься! Выводим логи для отладки:"
              echo "=== ЛОГИ AUTH SERVICE ==="
              cat auth-server.log | tail -n 50
              echo "=== ЛОГИ EMPLOYEE SERVICE ==="
              cat employee-server.log | tail -n 50
              exit 1
            fi
          done
          
          echo "Оба сервиса успешно запущены!"
          chmod 777 $(pwd)

          echo "Запуск DAST для AuthService (8081)..."
          docker run --network="host" -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8081 \
            -g gen-auth.conf \
            -r report-auth.html || true

          echo "Запуск DAST для EmployeeService (8082)..."
          docker run --network="host" -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8082 \
            -g gen-employee.conf \
            -r report-employee.html || true
          
          echo "Остановка сервисов и контейнеров..."
          pkill -f bootRun
          docker stop kafka-dast && docker rm kafka-dast
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            dependency-check-report.html
            report-auth.html
            report-employee.html

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            dependency-check-report.html
            report.html