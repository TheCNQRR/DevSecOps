name: DevSecOps Pipeline

on: [push, pull_request]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache OWASP Data
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/odc-data
          key: ${{ runner.os }}-odc-data-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-odc-data-

      - name: SAST - Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto
        continue-on-error: true

      - name: SCA - Trivy Scan (Dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.58.2/trivy_0.58.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.58.2_Linux-64bit.deb
            
          trivy fs --scanners vuln --severity CRITICAL,HIGH --format html -o dependency-check-report.html .
        continue-on-error: true

      - name: Start services (Kafka, Postgres DB employee)
        run: |
          chmod +x ./gradlew
          
          echo "Запуск встроенного брокера Kafka..."
          docker run -d --name kafka-dast --network="host" apache/kafka:latest
          
          echo "Создание базы данных 'employee' в Postgres..."
          docker run --net="host" --rm -e PGPASSWORD=postgres postgres:15 \
            psql -h localhost -U postgres -c "CREATE DATABASE employee;" || true

      - name: Run AuthService
        run: |
          echo "Запуск AuthService на порту 8081..."
          ./gradlew :AuthService:bootRun > auth-server.log 2>&1 &
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Run EmployeeService
        run: |
          echo "Запуск EmployeeService на порту 8082..."
          ./gradlew :EmployeeService:bootRun > employee-server.log 2>&1 &
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Wait for services to be ready
        run: |
          echo "Ожидание готовности обоих сервисов..."
          TIMEOUT=90
          while ! nc -z localhost 8081 || ! nc -z localhost 8082; do   
            sleep 5
            TIMEOUT=$((TIMEOUT - 5))
            if [ $TIMEOUT -le 0 ]; then
              echo "Один из сервисов не смог запуститься! Выводим логи для отладки:"
              echo "=== ЛОГИ AUTH SERVICE ==="
              cat auth-server.log | tail -n 50
              echo "=== ЛОГИ EMPLOYEE SERVICE ==="
              cat employee-server.log | tail -n 50
              exit 1
            fi
          done
          
          echo "Оба сервиса успешно запущены!"
          sleep 10
          chmod 777 $(pwd)
        continue-on-error: true

      - name: Register test user and obtain JWT token
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          echo "Регистрация zap_scanner..."
          curl -X POST http://localhost:8081/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"zap_scanner","password":"ZapPass123!","role":"ADMIN"}' || true

          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:8081/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"zap_scanner","password":"ZapPass123!"}')

          TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Не удалось получить JWT токен"
            echo "Ответ сервера: $LOGIN_RESPONSE"
            exit 1
          fi

          echo "Токен получен: ${TOKEN:0:20}..."
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
        continue-on-error: true

      - name: DAST - OWASP ZAP Full Scan (Authenticated)
        run: |
          echo "Запуск ZAP Full Scan для AuthService (порт 8081)..."
          docker run --network="host" -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
            -t http://localhost:8081/api/auth/test-dast?param=test \
            -r report-auth-full.html \
            -z "-config replacer.full_list(0).description=auth \
                -config replacer.full_list(0).enabled=true \
                -config replacer.full_list(0).matchtype=REQ_HEADER \
                -config replacer.full_list(0).matchstr=Authorization \
                -config replacer.full_list(0).replacement='Bearer ${{ env.TOKEN }}'" || true

          echo "Запуск ZAP Full Scan для EmployeeService (порт 8082)..."
          docker run --network="host" -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
            -t http://localhost:8082/api/employee/test-dast?msg=hello \
            -r report-employee-full.html \
            -z "-config replacer.full_list(0).description=auth \
                -config replacer.full_list(0).enabled=true \
                -config replacer.full_list(0).matchtype=REQ_HEADER \
                -config replacer.full_list(0).matchstr=Authorization \
                -config replacer.full_list(0).replacement='Bearer ${{ env.TOKEN }}'" || true
          
          echo "Остановка сервисов и контейнеров..."
          pkill -f bootRun || true
          docker stop kafka-dast && docker rm kafka-dast || true
        continue-on-error: true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            dependency-check-report.html
            report-auth-full.html
            report-employee-full.html